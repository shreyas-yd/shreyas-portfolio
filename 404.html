<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Shreyas Y D</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:48px; }
    .error-page__num { font-family:var(--font-display); font-size:120px; font-weight:900; color:var(--rule); line-height:1; }
    .error-page__title { font-family:var(--font-display); font-size:32px; font-weight:700; color:var(--ink); margin:16px 0 12px; }
    .error-page__text { font-size:16px; color:var(--mid); font-weight:300; margin-bottom:32px; }
  </style>
</head>
<body>
<nav class="site-nav"><a class="nav-logo" href="index.html">Shreyas <span style="color:#c0432a;">Y D</span></a></nav>
<div class="error-page">
  <div>
    <div class="error-page__num">404</div>
    <div class="error-page__title">Page not found.</div>
    <p class="error-page__text">The page you're looking for doesn't exist or has moved.</p>
    <a class="btn btn--primary" href="index.html" style="display:inline-flex;">← Back to Home</a>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
